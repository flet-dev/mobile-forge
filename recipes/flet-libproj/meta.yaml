{% set version = "9.5.0" %}

package:
  name: flet-libproj
  version: '{{ version }}'

source:
  url: https://download.osgeo.org/proj/proj-{{ version }}.tar.gz

build:
  number: 10
# {% if sdk != 'android' %}
  script_env:
    LDFLAGS: '-undefined dynamic_lookup'
# {% endif %}

requirements:
  build:
    - cmake
  host:
    - flet-libtiff 4.7.0
    - flet-libcurl 8.11.0