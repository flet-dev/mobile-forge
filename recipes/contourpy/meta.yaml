package:
  name: contourpy
  version: "1.3.3"

requirements:
  build:
    - ninja
    - cmake
    - meson
  host:
    - pybind11
# {% if sdk == 'android' %}
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

build:
  number: 1
  backend-args:
    - -Csetup-args=--cross-file
    - -Csetup-args={MESON_CROSS_FILE}
