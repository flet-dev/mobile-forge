# Building for Android requires API Level 24 or above.
# See https://apilevels.com

package:
  name: numpy
  version: 2.2.2

requirements:
 build:
  - ninja
# numpy's C/C++ object code (SIMD vectorization, the random C++ module, …)
# is linked against libc++_shared.so on Android. Without this dep the wheel
# imports cleanly on iOS (Apple's system libc++ is always present) but on
# Android dies at `import numpy` with `dlopen failed: library
# "libc++_shared.so" not found` unless something else in the app's dep tree
# happens to pull it in (e.g. grpcio).
{% if sdk == 'android' %}
 host:
  - flet-libcpp-shared >=27.2.12479018
{% endif %}

patches:
{% if version and version < (2, 0) %}
  - mobile-1.26.4.patch
{% else %}
  - mobile-2.2.2.patch
{% endif %}

build:
  script_env:
    NPY_DISABLE_SVML: 1

  backend-args:
    - -Csetup-args=-Dblas=none
    - -Csetup-args=-Dlapack=none
    - -Csetup-args=--cross-file
    - -Csetup-args={MESON_CROSS_FILE}

  meson:
    properties:
# {% if sdk == 'iOS' or (sdk == 'android' and arch in ['arm64-v8a', 'x86_64']) %}
      longdouble_format: IEEE_QUAD_LE
# {% else %}
      longdouble_format: IEEE_DOUBLE_LE
# {% endif %}