# Building for Android requires API Level 24 or above.
# See https://apilevels.com

package:
  name: numpy
  version: 2.4.6

requirements:
 build:
  - ninja
{% if sdk == 'android' %}
 host:
  - flet-libcpp-shared >=27.2.12479018
{% endif %}

{% if version and version < (2, 0) %}
patches:
  - mobile-1.26.4.patch
{% endif %}
# numpy >= 2.0: no patches required. The 2.2.2-era patch (vendored
# meson: -bundle -> -dynamiclib for the iOS shared-module link) was
# upstreamed in numpy's vendored meson — `get_std_shared_module_args`
# now branches on `self.system == 'ios'` natively.

build:
  number: 1
  script_env:
    NPY_DISABLE_SVML: 1

  backend-args:
    - -Csetup-args=-Dblas=none
    - -Csetup-args=-Dlapack=none
    - -Csetup-args=--cross-file
    - -Csetup-args={MESON_CROSS_FILE}

  meson:
    properties:
# {% if sdk == 'iOS' or (sdk == 'android' and arch in ['arm64-v8a', 'x86_64']) %}
      longdouble_format: IEEE_QUAD_LE
# {% else %}
      longdouble_format: IEEE_DOUBLE_LE
# {% endif %}
