package:
  name: jq
  version: "1.11.0"

requirements:
  # host_build (not host): flet-libjq's static archives are linked INTO the jq
  # extension and must NOT be shipped as a runtime dependency — a bundled
  # libjq.so would collide with the `jq` extension's own jniLibs name on Android
  # (see recipes/jq/patches/mobile.patch and recipes/flet-libjq/build.sh).
  host_build:
    - flet-libjq 1.7.1

build:
  number: 2
  script_env:
    JQPY_USE_SYSTEM_LIBS: 1

patches:
  - mobile.patch