{% set version = "24.0.0" %}
package:
  name: flet-libarrow
  version: '{{ version }}'
  # Only 64-bit slices are shipped: Arrow's CMake configs carry a 32/64-bit gate
  # (ArrowConfigVersion.cmake marks PACKAGE_VERSION_UNSUITABLE unless
  # sizeof(void*)==8), so a 32-bit pyarrow could not consume this libarrow anyway.
  # pyarrow excludes the same arches; building libarrow for them would just be
  # unconsumable CI work, so drop them here too.
  excluded_arches: [armeabi-v7a, x86]

build:
  number: 1

source:
  # Apache Arrow C++ (curated source release; build dir = its cpp/). pyarrow
  # links this shared libarrow. MINIMAL CORE for now — IPC only, no compute /
  # parquet / compression (see build.sh + the feasibility notes).
  url: https://archive.apache.org/dist/arrow/arrow-{{ version }}/apache-arrow-{{ version }}.tar.gz

requirements:
  build:
    - cmake
    - ninja
# {% if sdk == 'android' %}
  host:
    # libarrow.so is C++; on Android it links libc++_shared.so.
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}
