package:
  name: python-magic
  version: "0.4.27"

build:
  number: 2
  script_env:
    # flet-libmagic (the host dep below) installs the compiled magic database
    # into the cross-env at opt/share/misc/magic.mgc. Hand setup.py that path so
    # it copies magic.mgc INTO the python-magic wheel (see mobile.patch note 2):
    # Flet 0.86 Android's copyOpt drops non-.so files from a flet-lib* opt/ tree,
    # so the DB must ride python-magic's own (all-files) sitepackages.zip instead.
    FLET_MAGIC_MGC: "{platlib}/opt/share/misc/magic.mgc"

requirements:
  host:
    # python-magic is a pure-Python ctypes wrapper that dlopens libmagic at
    # runtime (loader + magic-db patched by mobile.patch). Ship libmagic (the .so
    # it dlopens) and, via FLET_MAGIC_MGC above, its magic.mgc database; fix_wheel
    # turns this into a Requires-Dist so pip pulls the platform .so.
    - flet-libmagic 5.46

patches:
  - mobile.patch
