package:
  name: tokenizers
  # Capped at 0.22.2 (last stable release without 32-bit-incompatible
  # atomics). tokenizers 0.23.1 introduced `static NEXT_CACHE_ID:
  # AtomicU64` in src/models/bpe/model.rs which fails to compile on
  # `arm-linux-androideabi` (armeabi-v7a) with `error[E0432]:
  # unresolved import std::sync::atomic::AtomicU64` — the ARMv7-A
  # core has no native 64-bit atomic ops. Re-attempt 0.23+ once we
  # carry a recipe-side patch swapping the AtomicU64 for a portable-
  # atomic crate, or after upstream gates the cache id on a
  # `cfg(target_has_atomic = "64")` build.
  version: 0.22.2

# {% if sdk == 'android' %}
requirements:
  host:
    # tokenizers' Rust core links libstdc++, which on Android is
    # libc++_shared.so. Without this dep the wheel loads with
    # `dlopen failed: library "libc++_shared.so" not found`
    # (mirrors the numpy + blis Android wiring).
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

build:
  number: 1
  script_env:
    _PYTHON_SYSCONFIGDATA_NAME: '{sysconfigdata_name}'