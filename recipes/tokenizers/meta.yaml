package:
  name: tokenizers
  version: 0.23.1

# {% if sdk == 'android' %}
requirements:
  host:
    # tokenizers' Rust core links libstdc++, which on Android is
    # libc++_shared.so. Without this dep the wheel loads with
    # `dlopen failed: library "libc++_shared.so" not found`
    # (mirrors the numpy + blis Android wiring).
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

build:
  number: 1
  script_env:
    _PYTHON_SYSCONFIGDATA_NAME: '{sysconfigdata_name}'

patches:
  # 0.23.1 added `static NEXT_CACHE_ID: AtomicU64` in src/models/bpe/model.rs;
  # std::sync::atomic::AtomicU64 is absent on 32-bit ARM (arm-linux-androideabi /
  # armeabi-v7a — no native 64-bit atomics) -> error[E0432]. The patch routes
  # that one type through the portable-atomic crate (which ships a 32-bit
  # fallback), so every arch builds.
  - mobile.patch