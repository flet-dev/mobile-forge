{% set version = "1.0.1" %}

package:
  name: flet-libpyjni
  version: '{{ version }}'
  # JNI bridge to the Android JVM — no equivalent on iOS, build can't
  # succeed there. (Mirrors flet-libcpp-shared's platforms gate.)
  platforms: [android]

build:
  number: 10

source:
  url: https://github.com/flet-dev/libpyjni/releases/download/v{{ version }}/pyjni-{{ version }}.tar.gz
  
requirements:
  build:
    - cmake