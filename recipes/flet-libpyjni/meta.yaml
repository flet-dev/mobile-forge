package:
  name: flet-libpyjni
  version: 1.0.1
  # JNI bridge to the Android JVM — no equivalent on iOS, build can't
  # succeed there. (Mirrors flet-libcpp-shared's platforms gate.)
  platforms: [android]

build:
  number: 4

source:
  url: https://github.com/flet-dev/libpyjni/releases/download/v1.0.1/pyjni-1.0.1.tar.gz
  
requirements:
  build:
    - cmake