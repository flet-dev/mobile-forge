package:
  name: opencv-python
  version: 4.10.0.84

requirements:
  host:
    - numpy ^2.0.0
# {% if sdk == 'android' %}
    # CLEANUP-AFTER: flet-dev/mobile-forge#58
    #
    # Defensive. opencv-python's single .so carries no DT_NEEDED on
    # libc++_shared — verified via `llvm-readobj --needed-libs` against
    # the published android arm64 wheel; OpenCV's heavy C++ stdlib is
    # statically linked into the wheel. The dep belongs to numpy:
    # opencv-python host-deps `numpy ^2.0.0`, and numpy's
    # _multiarray_umath / _pocketfft_umath need libc++_shared at
    # dlopen. The numpy wheel on pypi.flet.dev today carries no
    # Requires-Dist entries at all, so libcpp never reaches the flet
    # bundler unless someone in the install graph declares it
    # explicitly. Drop this line after #58 merges and a numpy rebuild
    # lands on pypi.flet.dev with libcpp surfaced in METADATA.
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

patches:
  - mobile.patch

build:
  number: 4
  script_env:
# {% if sdk == 'android' %}
    CMAKE_ARGS: >-
      -DANDROID=ON
      -DWITH_IPP=OFF
      -DWITH_ITT=OFF
      -DBUILD_ANDROID_PROJECTS=OFF
      -DBUILD_ANDROID_EXAMPLES=OFF
      -DBUILD_TESTS=OFF
      -DBUILD_PERF_TESTS=OFF
      -DENABLE_TESTING=OFF
      -DBUILD_EXAMPLES=OFF
      -DANDROID_ABI={ANDROID_ABI}
      -DANDROID_STANDALONE_TOOLCHAIN={NDK_ROOT}
      -DANDROID_NATIVE_API_LEVEL={ANDROID_API_LEVEL}
      -DANDROID_ALLOW_UNDEFINED_VERSION_SCRIPT_SYMBOLS=1
      -DCMAKE_TOOLCHAIN_FILE={NDK_ROOT}/build/cmake/android.toolchain.cmake
      -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-z,max-page-size=16384"
      -DCMAKE_MODULE_LINKER_FLAGS="-Wl,-z,max-page-size=16384"
      -DOPENCV_FORCE_PYTHON_LIBS=ON
      -DPYTHON3_INCLUDE_PATH={prefix}/include/python{py_version_short}
      -DPYTHON3_LIBRARIES={prefix}/lib/libpython{py_version_short}.so
      -DPYTHON3_NUMPY_INCLUDE_DIRS={platlib}/numpy/_core/include
# {% else %}
    CMAKE_ARGS: >-
      -DAPPLE_FRAMEWORK=ON
      -DCMAKE_SYSTEM_NAME=iOS
      -DCMAKE_SYSTEM_PROCESSOR=aarch64
      -DCMAKE_OSX_SYSROOT={{ sdk }}
      -DCMAKE_OSX_DEPLOYMENT_TARGET={{ sdk_version }}
      -DCMAKE_OSX_ARCHITECTURES={{ arch }}
      -DWITH_IPP=OFF
      -DWITH_ITT=OFF
      -DBUILD_TESTS=OFF
      -DBUILD_PERF_TESTS=OFF
      -DENABLE_TESTING=OFF
      -DBUILD_EXAMPLES=OFF
      -DWITH_OPENCL=OFF
      -DOPENCV_FORCE_PYTHON_LIBS=ON
      -DPYTHON3_INCLUDE_PATH={prefix}/include/python{py_version_short}
      -DPYTHON3_LIBRARIES={prefix}/lib/libpython{py_version_short}.so
      -DPYTHON3_NUMPY_INCLUDE_DIRS={platlib}/numpy/_core/include
# {% endif %}