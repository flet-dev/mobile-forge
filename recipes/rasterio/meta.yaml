package:
  name: rasterio
  version: 1.5.0

requirements:
  host:
    - flet-libgdal 3.13.1
    - numpy ^2.0.0
# {% if sdk == 'android' %}
    # rasterio's `_warp.so` / `_filepath.so` / `_fill.so` carry
    # `DT_NEEDED libc++_shared.so` directly.
    - flet-libcpp-shared >=27.2.12479018
# {% else %}
    # iOS-only — see GDAL_LIBS comment below for the rationale.
    - openssl >=3.0.15
    - flet-libjpeg 3.0.90
# {% endif %}

build:
  # Same source version as pypi.flet.dev's rasterio-1.5.0-10 wheel, but
  # this rebuild links against flet-libgdal 3.13.1 (vs. the published
  # wheel's 3.10.0). pip's wheel selection picks the higher build_tag
  # per PEP 427 when name+version collide; the new wheel must outrank
  # build 10 or downstream installs would silently keep the old
  # libgdal-3.10-linked rasterio and the gdal chain bump would be invisible.
  number: 11
  script_env:
    GDAL_VERSION: 3.13.1
    GDAL_LIB_PATH: '{platlib}/opt/lib'
    GDAL_INCLUDE_PATH: '{platlib}/opt/include'
# {% if sdk == 'android' %}
    GDAL_LIBS: gdal
# {% else %}
    # On iOS every native dep is a static archive (libgdal, libproj,
    # libtiff, libcurl, libpsl all `-DBUILD_SHARED_LIBS=OFF`). When
    # GDAL was linked at its own build time the linker only kept object
    # files for symbols GDAL itself referenced — anything else was left
    # undefined in libgdal.a. iOS dyld eagerly resolves the flat
    # namespace at dlopen and aborts on the first miss (e.g. `_geod_init`
    # from libproj, which is what `import rasterio` trips). Adding the
    # full dep chain to GDAL_LIBS makes rasterio's `_base`/`_io`/`_features`
    # link commands pull every missing object straight out of its archive.
    #
    # Identical fix shipped in recipes/gdal, recipes/pyogrio. The right
    # long-term fix lives in `flet-libgdal`: align iOS cmake with Android
    # (`-DGDAL_USE_CURL=OFF`, `-DGDAL_USE_TIFF_INTERNAL=ON`, …) so
    # libgdal.a stops leaking refs at all.
    GDAL_LIBS: gdal,proj,tiff,curl,psl,sqlite3,jpeg,ssl,crypto,z
    LDFLAGS: '-undefined dynamic_lookup'
# {% endif %}

patches:
  - mobile.patch
