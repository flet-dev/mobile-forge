package:
  name: fiona
  version: "1.10.1"

requirements:
  host:
    - flet-libgdal 3.13.1
# {% if sdk != 'android' %}
    # iOS-only — see GDAL_LIBS comment below for the rationale.
    - openssl >=3.0.15
    - flet-libjpeg 3.0.90
# {% endif %}

build:
  # Same source version as pypi.flet.dev's fiona-1.10.1-10 wheel, but
  # this rebuild links against flet-libgdal 3.13.1 (vs. the published
  # wheel's 3.10.0). pip's wheel selection picks the higher build_tag
  # per PEP 427 when name+version collide; the new wheel must outrank
  # build 10 or downstream installs would silently keep the old
  # libgdal-3.10-linked fiona and the gdal chain bump would be invisible.
  number: 11
  script_env:
    GDAL_VERSION: 3.13.1
    GDAL_LIB_PATH: '{platlib}/opt/lib'
    GDAL_INCLUDE_PATH: '{platlib}/opt/include'
# {% if sdk == 'android' %}
    GDAL_LIBS: gdal
# {% else %}
    # On iOS every native dep is a static archive (libgdal, libproj,
    # libtiff, libcurl are all `-DBUILD_SHARED_LIBS=OFF`). When GDAL
    # was linked at *its* build time the linker only kept object files
    # for symbols GDAL itself referenced — and GDAL's GTiff/HTTP/proj
    # code paths reference `TIFFClientOpen`, `curl_easy_init`,
    # `geod_init` and friends, all of which were left undefined in
    # libgdal.a. When fiona's `_env.so` links against libgdal it
    # inherits those undefined references; with `-undefined
    # dynamic_lookup` they're deferred to dlopen, where iOS dyld
    # eagerly resolves the flat namespace and aborts the load.
    #
    # Adding the dep libs to GDAL_LIBS makes fiona's extension link
    # command pull the missing object files straight out of libproj.a,
    # libtiff.a, libcurl.a (and its OpenSSL/zlib backends), libjpeg.a
    # (libtiff's JPEG-in-TIFF support), and the iOS system stubs for
    # libsqlite3 / libz.
    #
    # The right long-term fix lives in `flet-libgdal`: align the iOS
    # cmake invocation with the Android one — `-DGDAL_USE_CURL=OFF`,
    # `-DGDAL_USE_TIFF_INTERNAL=ON`, … — so libgdal.a doesn't leak
    # external refs in the first place. Then every consumer of GDAL on
    # iOS works with just `-lgdal -lproj`. Tracked for a future bump.
    GDAL_LIBS: gdal,proj,tiff,curl,psl,sqlite3,jpeg,ssl,crypto,z
    LDFLAGS: '-undefined dynamic_lookup'
# {% endif %}

patches:
  - mobile.patch