package:
  name: grpcio
  version: "1.81.0"

build:
  number: 1
  script_env:
# {% if sdk == 'android' %}
    GRPC_PYTHON_BUILD_SYSTEM_OPENSSL: '1'
    GRPC_PYTHON_BUILD_SYSTEM_ZLIB: '1'
    PLATFORM: android
    OPENSSL_ROOT_DIR: '{platlib}/opt'
    CFLAGS: '-U__ANDROID_API__ -D__ANDROID_API__={{ sdk_version }} -Wno-reserved-user-defined-literal'
    LDFLAGS: '-llog -L{platlib}/opt/lib'
# {% else %}
    # grpcio 1.81's vendored abseil-cpp requires C++17 (policy_checks.h rejects anything < C++17).
    # The narrowing warning suppression is carried forward from the prior C++14 setting
    # because some legacy grpc files still trip on init-list narrowing.
    CXXFLAGS: -std=c++17 -Wno-c++11-narrowing
    LDFLAGS: '-framework CoreFoundation'
# {% endif %}

patches:
  - mobile.patch

# {% if sdk == 'android' %}
requirements:
  host:
    - openssl >=3.0.15
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}