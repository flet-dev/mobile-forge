package:
  name: Pillow
  version: 11.1.0

requirements:
  host:
    # PNG support is internal: libpng is not used.
    - flet-libjpeg 3.0.90
    - flet-libfreetype 2.13.3

# {% if not version or version >= (11,0,0) %}
# pillow >= 11.x

patches:
  - setup-11.x.patch

# {% else %}
# pillow <= 10.x

patches:
  - setup-10.x.patch

# {% endif %}

build:
  number: 4
# {% if sdk != 'android' %}
  script_env:
# {% if sdk == 'android' %}
    # pillow's setup.py manually probes `self.compiler.{include,library}_dirs`
    # for zlib.h / libz / libjpeg / libfreetype rather than relying on the
    # compiler's own --sysroot search. Our mobile.patch sets
    # `disable_platform_guessing=True` to keep host-Linux paths out of the
    # cross-build — which also drops the NDK sysroot from those lists.
    # iOS gets away with it because Python-Apple-support's sysconfig
    # populates `compiler.include_dirs` with the SDK include path; the
    # Android cross-venv doesn't surface NDK paths the same way (they're
    # in CFLAGS/LDFLAGS but distutils never reflects those into the dir
    # lists). Pillow natively honors CPATH / LIBRARY_PATH (lines 538–548
    # of its setup.py), so we feed the cross-compile paths back in that
    # way — covering both the NDK sysroot (zlib, system headers) and the
    # cross-venv's opt/ tree (libjpeg, libfreetype host wheels).
    CPATH: '{NDK_SYSROOT}/usr/include:{platlib}/opt/include'
    LIBRARY_PATH: '{NDK_SYSROOT}/usr/lib/{HOST_TRIPLET}/{ANDROID_API_LEVEL}:{platlib}/opt/lib'
    # libfreetype links against libz internally; -lz needs to appear on
    # pillow's link cmd so the resulting _imagingft.so resolves it.
    LDFLAGS: -lz
# {% else %}
    # libfreetype references both libz and libbz2
    # but doesn't link them into the static library
    LDFLAGS: -lz -lbz2
# {% endif %}
# {% endif %}
