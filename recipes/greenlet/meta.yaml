package:
  name: greenlet
  version: 3.5.1

# {% if sdk == 'android' %}
requirements:
  host:
    # greenlet's _greenlet.so is C++; on Android this links libstdc++ which is libc++_shared.so.
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

build:
  number: 1
# {% if sdk != 'android' %}
  script_env:
    CXXFLAGS: -std=c++14
# {% endif %}
