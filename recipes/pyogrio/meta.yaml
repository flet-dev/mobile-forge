package:
  name: pyogrio
  version: 0.10.0

requirements:
  host:
    - flet-libgdal 3.10.0
# {% if sdk == 'android' %}
    # pyogrio's Cython extension links libgdal which pulls in libstdc++
    # → libc++_shared.so on Android. Without this dep the wheel loads with
    # `dlopen failed: library "libc++_shared.so" not found`.
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

build:
  script_env:
    GDAL_VERSION: 3.10.0
    GDAL_LIBRARY_PATH: '{platlib}/opt/lib'
    GDAL_INCLUDE_PATH: '{platlib}/opt/include'
# {% if sdk != 'android' %}
    LDFLAGS: '-undefined dynamic_lookup'
# {% endif %}