package:
  name: pyogrio
  version: 0.10.0

requirements:
  host:
    - flet-libgdal 3.10.0
# {% if sdk == 'android' %}
    # CLEANUP-AFTER: flet-dev/mobile-forge#58
    #
    # Defensive. Neither pyogrio's own .so files (_io, _vsi,
    # _geometry, _ogr, _err) NOR the libgdal.so they link against
    # carry DT_NEEDED on libc++_shared — verified via
    # `llvm-readobj --needed-libs` against the published android arm64
    # wheels. libgdal is built with libstdc++ statically linked, so
    # pyogrio's own code path doesn't need libcpp at runtime. The dep
    # belongs to numpy: pyogrio's upstream `Requires-Dist: numpy>=1.21`
    # pulls numpy into every pyogrio-using app, and numpy's
    # _multiarray_umath / _pocketfft_umath need libc++_shared at
    # dlopen. The numpy wheel on pypi.flet.dev today carries no
    # Requires-Dist entries at all, so libcpp never reaches the flet
    # bundler unless someone in the install graph declares it
    # explicitly. Drop this line after #58 merges and a numpy rebuild
    # lands on pypi.flet.dev with libcpp surfaced in METADATA.
    - flet-libcpp-shared >=27.2.12479018
# {% else %}
    # iOS-only — see GDAL_LIBS comment below for the rationale.
    - openssl >=3.0.15
    - flet-libjpeg 3.0.90
# {% endif %}

build:
  script_env:
    GDAL_VERSION: 3.10.0
    GDAL_LIBRARY_PATH: '{platlib}/opt/lib'
    GDAL_INCLUDE_PATH: '{platlib}/opt/include'
# {% if sdk != 'android' %}
    # On iOS every native dep is a static archive (libgdal, libproj,
    # libtiff, libcurl, libpsl all `-DBUILD_SHARED_LIBS=OFF`). When
    # GDAL was linked at its own build time the linker only kept
    # object files for symbols GDAL itself referenced — anything else
    # was left undefined in libgdal.a. iOS dyld eagerly resolves the
    # flat namespace at dlopen and aborts on the first miss
    # (`_geod_init`, `_TIFFClientOpen`, `_psl_builtin`, …). Adding the
    # full dep chain to GDAL_LIBS makes pyogrio's `_io`/`_ogr` link
    # commands pull every missing object straight out of its archive.
    #
    # Identical fix shipped in recipes/fiona, recipes/gdal. The right
    # long-term fix lives in `flet-libgdal`: align iOS cmake with
    # Android (`-DGDAL_USE_CURL=OFF`, `-DGDAL_USE_TIFF_INTERNAL=ON`,
    # …) so libgdal.a stops leaking refs at all.
    GDAL_LIBS: gdal,proj,tiff,curl,psl,sqlite3,jpeg,ssl,crypto,z
    LDFLAGS: '-undefined dynamic_lookup'
# {% endif %}

patches:
  - mobile.patch
