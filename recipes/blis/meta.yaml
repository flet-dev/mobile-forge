package:
  name: blis
  version: 1.0.0

requirements:
  host:
    - numpy ^2.0.0
# {% if sdk == 'android' %}
    # CLEANUP-AFTER: flet-dev/mobile-forge#58
    #
    # Defensive. blis's own .so files carry no DT_NEEDED on
    # libc++_shared — verified via `llvm-readobj --needed-libs` against
    # the published android arm64 wheel; any C++ stdlib references in
    # blis are statically linked into the .so. The dep belongs to
    # numpy: blis host-deps `numpy ^2.0.0`, and numpy's
    # _multiarray_umath / _pocketfft_umath need libc++_shared at dlopen.
    # The numpy wheel on pypi.flet.dev today carries no Requires-Dist
    # entries at all, so libcpp never reaches the flet bundler unless
    # someone in the install graph declares it explicitly. Drop this
    # line after #58 merges and a numpy rebuild lands on pypi.flet.dev
    # with libcpp surfaced in METADATA.
    - flet-libcpp-shared >=27.2.12479018
# {% endif %}

patches:
  - mobile.patch