package:
  name: opaque
  version: 1.0.0

build:
  number: 1

requirements:
  host:
    - flet-libopaque 1.0.1

# opaque 1.0.0 upstream tried to fix the install_requires problem the
# 0.2.0 recipe had to work around, but shipped `install_requires =
# ("pysodium")` — string-without-trailing-comma is just a string, not
# a tuple, which setuptools treats inconsistently. mobile.patch rewrites
# it to a proper list `install_requires=["pysodium"]` so pip pulls
# pysodium reliably.
patches:
  - mobile.patch
