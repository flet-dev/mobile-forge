package:
  name: opaque
  version: 0.2.0

requirements:
  host:
    - flet-libopaque 0.99.8

# Patch upstream setup.py to declare `pysodium` as install_requires.
# Upstream's 0.2.0 setup.py only sets `requires=["libsodium"]` (metadata-
# only, NOT a real pip dependency), so when the recipe-tester installs
# `opaque` pip doesn't pull pysodium, and `import opaque` then fails at
# runtime with `ModuleNotFoundError: No module named 'pysodium'`. The
# 1.0.0 upstream tried to fix this but shipped `install_requires =
# ("pysodium")` — string-without-trailing-comma is just a string, not a
# tuple, and setuptools silently drops it.
patches:
  - mobile.patch
