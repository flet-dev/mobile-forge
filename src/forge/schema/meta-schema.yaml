# A subset of conda syntax
# (https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html).

type: object
required: [package]
properties:

  package:
    type: object
    required: [name, version]
    properties:
      name:
        type: string
        description: >-
          Package name. Must be in its original form, as used in sdist filenames.
      version:
        type: [string, number]
      platforms:
        type: array
        items:
          type: string
          enum: [android, ios]
        minItems: 1
        uniqueItems: true
        description: >-
          Optional list of supported target platforms.
          Defaults to all platforms if not specified.
      excluded_arches:
        type: array
        items:
          type: string
          enum: [arm64-v8a, armeabi-v7a, x86_64, arm64]
        uniqueItems: true
        description: >-
          Optional list of target architectures to skip for this package
          (e.g. [armeabi-v7a] for a library with no 32-bit support). Other
          arches of the same platform still build.
    additionalProperties: false

  source:
    default: pypi
    description: >-
      How forge obtains the source tree the build runs in. This key is OPTIONAL;
      when omitted it defaults to `pypi`, so a bare recipe downloads the package's
      PyPI sdist. To declare that a recipe has NO upstream source, set this property to `null`.
    oneOf:
      - type: "null"
        description: >-
          No upstream archive. forge skips the download+unpack step and just hands
          the recipe's build.sh an empty build directory to work in; the build
          script produces its own source (e.g. copying a library out of the NDK, or
          generating one inline). Use for build.sh recipes that have no real upstream
          tarball — e.g. flet-libomp, flet-libcpp-shared.
      - type: string
        const: pypi
        description: >-
          Download the package's sdist from PyPI, matched by package.name + package.version. 
          The usual choice for Python-package recipes.
      - type: object
        required: [url]
        properties:
          url:
            type: string
        additionalProperties: false
        description: >-
          Download and unpack an archive from a URL. Use when there is no PyPI
          sdist (e.g. a GitHub release/tag tarball) or for native libraries. The
          URL may contain `{version}`, `{build}`, `{sdk}` and `{arch}` format
          placeholders, substituted per build.
      - type: object
        required: [git_url, git_rev]
        properties:
          git_url:
            type: string
          git_rev:
            type: [string, number]
        additionalProperties: false
        description: Clone a Git repository at the given revision (branch, tag or commit SHA).
      - type: object
        required: [path]
        properties:
          path:
            type: string
        additionalProperties: false
        description: Copy a local directory into the build tree (for local development / testing).

  patches:
    type: array
    default: []
    items:
      type: string
    description: >-
      Patches to apply to the code. Each entry is a filename in the
      `patches` folder of the recipe.

  extract_packages:
    type: array
    default: []
    items:
      type: string
    description: >-
      Android only. Import-relative paths (usually the package's import name)
      to ship EXTRACTED to disk instead of inside Flet 0.86's compressed
      `sitepackages.zip`. Needed for "path-hungry" packages that read bundled
      DATA files through a real `__file__` path (rather than
      `importlib.resources`) — inside the zip such reads fail with
      `NotADirectoryError`. Consumed by the recipe-tester
      (`tests/recipe-tester/stage_recipe.sh` -> flet build
      `[tool.flet.android].extract_packages`); forge's build itself ignores it.

  build:
    type: object
    default: {}
    properties:
      number:
        type: integer
        default: 1
        description: >-
          The build number, which is part of the wheel tag and can be used to 
          distinguish multiple builds of the same version. Higher numbers are newer and 
          have higher precedence when pip chooses between multiple available wheels,
          for a given version and platform.
      script_env:
        type: object
        default: {}
        description: >-
          Environment variables in the form KEY=value (no spaces around =).
      before_all:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: >-
          Shell command(s) run once per platform on the build HOST before
          building, to set up non-Python build tools the runner doesn't already
          have (e.g. autotools + gettext for an autoreconf'd source, or
          `brew link` for a keg-only formula). Jinja-rendered, so it can branch
          on `sdk`; an array is run as separate commands. The CI harness runs
          this on the ephemeral runner — forge does NOT run it locally (it only
          surfaces it as a hint), so keep it to host build-tool setup.
    additionalProperties: true

  requirements:
    type: object
    default: {}
    properties:

      build:
        type: array
        default: []
        items:
          type: string
        description: |-
          Build-time tools, installed into the BUILD environment — the
          host-runnable side of the cross venv (via `build-pip`) — for programs
          that must RUN on the build machine to produce the wheel, e.g. `cython`,
          `cmake`, `ninja`, `meson`, `setuptools`. Source distributions are
          allowed here (this environment is native to the build host). These are
          NEVER recorded as runtime dependencies of the wheel (not added to
          Requires-Dist). The package's own PEP 517 `build-system.requires` (from
          its pyproject.toml) are installed automatically in addition to these.

      host:
        type: array
        default: []
        items:
          type: string
        description: |-
          Native (cross-compiled) libraries the package links against, installed
          into the CROSS/target environment — target binary wheels only
          (`--only-binary`; a matching wheel must resolve from `dist/` or
          pypi.flet.dev). Each unpacks an `opt/` tree under the cross env
          (`install_root`); its `opt/include` and `opt/lib` are added
          automatically to the build's CFLAGS/LDFLAGS, and `opt/lib/pkgconfig` to
          the pkg-config search path. A recipe can also reach specific files via
          the `{platlib}`/`{prefix}` placeholders in `build.script_env`
          (e.g. `{platlib}/opt/bin/pg_config`). A `flet-*` host requirement is
          ALSO written into the wheel's `Requires-Dist` (pinned `==` to its
          version), so the consuming app bundles it at runtime — use `host` when
          the package DYNAMICALLY links or `ctypes`-loads the lib at runtime
          (e.g. psycopg v3 -> flet-libpq, pyzbar -> flet-libzbar). Non-`flet-*`
          entries (e.g. `openssl`, part of the base Flet runtime) are used for the
          build link only and are NOT promoted to Requires-Dist. For a lib that is
          STATICALLY linked into the package instead, use `host_build`.

      host_build:
        type: array
        default: []
        items:
          type: string
        description: |-
          Like `host` — a native target library installed into the cross
          environment, with its `opt/include`/`opt/lib` wired into the build's
          CFLAGS/LDFLAGS/pkg-config — but BUILD-TIME ONLY: it is NOT added to
          the wheel's Requires-Dist. Use for a `flet-*` lib the package STATICALLY
          links and folds into its own `.so` (e.g. psycopg2 -> flet-libpq,
          pymssql -> flet-libfreetds): the lib is baked into the extension at
          build time, so the consuming app must not also bundle the (unused)
          `flet-*` wheel at runtime.

    additionalProperties: false

  about:
    type: object
    default: {}
    properties:

      license_file:
        type: string
        default: ""
        description: >-
          Filename, relative to the source directory, to add to the
          wheel's .dist-info directory. build-wheel will automatically
          include any file in the source or recipe directory whose name
          starts with "LICEN[CS]E" or "COPYING", case-insensitive. If
          there is no such file, then this setting is required.

    additionalProperties: false

additionalProperties: false
