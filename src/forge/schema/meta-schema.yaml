# A subset of conda syntax
# (https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html).

type: object
required: [package]
properties:

  package:
    type: object
    required: [name, version]
    properties:
      name:
        type: string
        description: >-
          Package name. Must be in its original form, as used in sdist filenames.
      version:
        type: [string, number]
      platforms:
        type: array
        items:
          type: string
          enum: [android, ios]
        minItems: 1
        uniqueItems: true
        description: >-
          Optional list of supported target platforms.
          Defaults to all platforms if not specified.
      excluded_arches:
        type: array
        items:
          type: string
          enum: [arm64-v8a, armeabi-v7a, x86_64, x86, arm64]
        uniqueItems: true
        description: >-
          Optional list of target architectures to skip for this package
          (e.g. [armeabi-v7a, x86] for a library with no 32-bit support).
          Other arches of the same platform still build. The 32-bit android
          arches only build on Python < 3.13, so excluding them is a no-op on
          newer interpreters.
    additionalProperties: false

  source:
    default: pypi
    oneOf:
      - type: "null"
        description: The build script will get its own source.
      - type: string
        const: pypi
        description: Download an sdist from PyPI.
      - type: object
        required: [url]
        properties:
          url:
            type: string
        additionalProperties: false
        description: Download an archive from a URL.
      - type: object
        required: [git_url, git_rev]
        properties:
          git_url:
            type: string
          git_rev:
            type: [string, number]
        additionalProperties: false
        description: Clone a Git repository.
      - type: object
        required: [path]
        properties:
          path:
            type: string
        additionalProperties: false
        description: Copy a local directory.

  patches:
    type: array
    default: []
    items:
      type: string
    description: >-
      Patches to apply to the code. Each entry is a filename in the
      `patches` folder of the recipe.

  build:
    type: object
    default: {}
    properties:
      number:
        type: integer
        default: 1
        description: >-
          The build number, which is part of the wheel tag and can be used to 
          distinguish multiple builds of the same version. Higher numbers are newer and 
          have higher precedence when pip chooses between multiple available wheels,
          for a given version and platform.
      script_env:
        type: object
        default: {}
        description: >-
          Environment variables in the form KEY=value (no spaces around =).
      before_all:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: >-
          Shell command(s) run once per platform on the build HOST before
          building, to set up non-Python build tools the runner doesn't already
          have (e.g. autotools + gettext for an autoreconf'd source, or
          `brew link` for a keg-only formula). Jinja-rendered, so it can branch
          on `sdk`; an array is run as separate commands. The CI harness runs
          this on the ephemeral runner — forge does NOT run it locally (it only
          surfaces it as a hint), so keep it to host build-tool setup.
    additionalProperties: true

  requirements:
    type: object
    default: {}
    properties:

      build:
        type: array
        default: []
        items:
          type: string
        description: |-
          Requirements which must be installed in the build environment.
          One of the following:
            * `<package> <version>`: A Python package.
            * `cmake`: indicates that CMake is used in the build. A
              `chaquopy.toolchain.cmake` file will be generated in the
              build directory for use with `-DCMAKE_TOOLCHAIN_FILE`.

      host:
        type: array
        default: []
        items:
          type: string
        description: |-
          Requirements which must be available at runtime. One of the
          following:
            * `<package> <version>`: a native Python package. A
              compatible wheel file must exist in pypi/dist, and will be
              extracted into $SRC_DIR/../requirements before the build
              is run. A requirement specification for >= this version
              will also be added to the final wheel.
            * `python`: indicates that this is a Python package. This is
              implied if `source` is `pypi` or unspecified. Python
              includes and libraries will be added to the CFLAGS and
              LDFLAGS, and the wheel build tag will be set accordingly.
            * `openssl` / `sqlite`: the corresponding library will be
              added to CFLAGS and LDFLAGS.

    additionalProperties: false

  about:
    type: object
    default: {}
    properties:

      license_file:
        type: string
        default: ""
        description: >-
          Filename, relative to the source directory, to add to the
          wheel's .dist-info directory. build-wheel will automatically
          include any file in the source or recipe directory whose name
          starts with "LICEN[CS]E" or "COPYING", case-insensitive. If
          there is no such file, then this setting is required.

    additionalProperties: false

additionalProperties: false
