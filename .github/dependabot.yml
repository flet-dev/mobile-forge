version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates monthly, 8PM UTC
      interval: "monthly"
      time: "20:00"
    # Wait a week after a release before proposing it — lets malicious/broken
    # releases get caught and yanked before we pull them.
    cooldown:
      default-days: 7
    # Bundle all action bumps into a single monthly PR.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      # Check for updates monthly, 8PM UTC
      interval: "monthly"
      time: "20:00"
    # Soak new releases before adopting them; longer for majors (riskiest).
    cooldown:
      default-days: 7
      semver-major-days: 30
    # Bundle all Python dependency bumps into a single monthly PR.
    groups:
      python-dependencies:
        patterns:
          - "*"
