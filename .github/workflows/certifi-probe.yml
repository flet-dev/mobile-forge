name: certifi-probe

# Diagnostic: does building a BARE flet app on a Linux CI host drop certifi's
# bytecode from the bundle (→ on-device `ModuleNotFoundError: certifi`)?
# Matrix over the builder version to answer "why now": stable 0.85.3 (the
# builder that worked on CI for months) vs the 0.86.0.dev2 prerelease this
# branch pins. No recipe involved — isolates the toolchain from the recipe.

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/certifi-probe.yml'

env:
  FLUTTER_NDK_VERSION: "28.2.13676358"

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flet_cli: ["0.85.3", "0.86.0.dev2"]
    name: certifi-probe (flet-cli ${{ matrix.flet_cli }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install NDK for Flutter Android build
        run: .ci/install_ndk.sh "$FLUTTER_NDK_VERSION"

      - name: Create a bare flet app
        run: |
          mkdir -p probeapp/src
          cat > probeapp/pyproject.toml <<'EOF'
          [project]
          name = "certprobe"
          version = "0.1.0"
          requires-python = ">=3.10"
          dependencies = ["flet"]

          [tool.flet]
          org = "com.probe"
          product = "certprobe"

          [tool.flet.app]
          path = "src"
          EOF
          cat > probeapp/src/main.py <<'PYEOF'
          import platform
          print(">>>> CERTPROBE start plat=", platform.system(), "py=", platform.python_version(), flush=True)
          try:
              import certifi
              print(">>>> app-side certifi OK ->", certifi.where(), flush=True)
          except Exception as e:
              print(">>>> app-side certifi FAILED ->", repr(e), flush=True)
          import flet as ft
          def main(page: ft.Page):
              page.add(ft.SafeArea(content=ft.Text("certprobe ok")))
          if __name__ == "__main__":
              ft.run(main)
          PYEOF

      - name: Build APK with flet-cli ${{ matrix.flet_cli }}
        id: build
        working-directory: probeapp
        continue-on-error: true
        run: |
          uvx --with flet-cli==${{ matrix.flet_cli }} --with flet==${{ matrix.flet_cli }} \
            flet build apk --arch x86_64 --yes -v --python-version 3.12

      - name: Inspect certifi bytecode in the Linux-built bundle
        working-directory: probeapp
        run: |
          echo "===== serious_python version resolved ====="
          awk '/^  serious_python:/{f=1} f&&/version:/{print $0; exit}' build/flutter/pubspec.lock 2>/dev/null || echo "(no pubspec.lock)"
          echo ""
          echo "===== certifi dir in build/site-packages ====="
          found=""
          for d in $(find build/site-packages -maxdepth 2 -iname certifi -type d 2>/dev/null); do
            found="$d"; echo "--- $d ---"; ls -la "$d"
          done
          echo ""
          echo "===== VERDICT ====="
          if [ -z "$found" ]; then
            echo "RESULT: certifi dir NOT FOUND in bundle"
          elif [ -f "$found/__init__.pyc" ] || [ -f "$found/__init__.py" ]; then
            echo "RESULT: certifi PRESENT (importable __init__ survives) -> should boot"
          else
            echo "RESULT: certifi BROKEN (no __init__.py/.pyc; only data) -> ModuleNotFoundError expected"
          fi

      - name: Run on Android emulator (API 28 x86_64) + read certifi outcome
        if: steps.build.outcome == 'success'
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 20
        with:
          api-level: 28
          arch: x86_64
          target: default
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: |
            adb install probeapp/build/apk/*.apk
            adb logcat -c
            adb shell am start -n com.probe.certprobe/.MainActivity || true
            sleep 45
            echo "===== flet.python / certifi / crash logcat ====="
            adb logcat -d -v brief flet.python:V python:V AndroidRuntime:E DEBUG:F '*:S' | tail -40
            echo "===== grep markers ====="
            adb logcat -d | grep -iE "certprobe|certifi|CERTPROBE|ModuleNotFound|sp_script" | tail -30
