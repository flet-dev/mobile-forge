name: Build wheels

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      archs:
        description: "Architectures (comma-separated, e.g. android,iOS)"
        required: false
        default: "android,iOS"
      packages:
        description: "Packages (comma-separated, e.g. pillow:11.1.0,pydantic-core:2.33.2)"
        required: false
        default: "pydantic-core:2.33.2"
      build_number:
        description: "Build number"
        required: false
        default: "1"
      publish:
        description: "Publish to PyPI"
        type: boolean
        default: false
      rerun_all_tests:
        description: "Re-run mobile tests for every recipe that has a test file"
        type: boolean
        default: false

env:
  UV_PYTHON: "3.12.12"
  MOBILE_FORGE_CACHE_DOWNLOADS_OFF: "1"
  NDK_VERSION: r27d

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed recipes
        id: changed-recipes
        uses: tj-actions/changed-files@v45
        with:
          files: recipes/**
          dir_names: true
          dir_names_max_depth: 2

      # Detect changes to the shared test runner — when this changes we widen
      # the matrix with a 6-recipe smoke set so regressions in the runner
      # itself can't slip through on PRs that touch only the runner.
      # Each smoke entry exercises a different recipe-pattern so a single
      # green run covers a meaningful slice of the recipes/ ecosystem:
      #   - numpy        : BLAS-free Meson build + Android libcpp host dep
      #   - pillow       : assets-directory test shape + image C-ext (libpng/freetype)
      #   - lxml         : libxml2 native-lib linkage + unittest.TestCase style
      #   - bcrypt       : minimal cffi
      #   - cryptography : OpenSSL host dep (different from libcpp)
      #   - bitarray     : pure C-ext, no host deps (vanilla-C-ext canary)
      # (pandas was in the original §5 Q3 list; dropped while pandas 2.2.3's
      # meson+cython cross-compile probe failure is investigated separately.)
      - name: Check if shared test runner changed
        id: shared-runner
        uses: tj-actions/changed-files@v45
        with:
          files: |
            tests/recipe-tester/**
            .ci/wait_for_console.sh
            .github/workflows/build-wheels.yml

      - id: detect-packages
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGES: ${{ inputs.packages }}
          INPUT_RERUN_ALL_TESTS: ${{ inputs.rerun_all_tests }}
          CHANGED_DIRS: ${{ steps.changed-recipes.outputs.all_changed_files }}
          SHARED_RUNNER_CHANGED: ${{ steps.shared-runner.outputs.any_changed }}
        run: |
          SMOKE_TEST="pydantic-core:2.33.2"
          SMOKE_SET="numpy: pillow: lxml: bcrypt: cryptography: bitarray:"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            pkgs="${INPUT_PACKAGES:-$SMOKE_TEST}"
          else
            pkgs=""
            for dir in $CHANGED_DIRS; do
              [[ -f "$dir/meta.yaml" ]] || continue   # skip deleted recipes
              pkgs="${pkgs:+$pkgs,}${dir#recipes/}:"
            done
            pkgs="${pkgs:-$SMOKE_TEST}"
          fi

          # Append the smoke set if the shared runner changed (push/PR) or
          # the workflow_dispatch rerun_all_tests flag is true. Dedup so a
          # PR touching both numpy AND main.py doesn't run numpy twice.
          if [[ "$SHARED_RUNNER_CHANGED" == "true" || "$INPUT_RERUN_ALL_TESTS" == "true" ]]; then
            for s in $SMOKE_SET; do
              s_name="${s%%:*}"
              # match either at start-of-string or after a comma
              if ! echo ",$pkgs," | grep -q ",${s_name}:"; then
                pkgs="${pkgs:+$pkgs,}$s"
              fi
            done
          fi

          echo "Detected packages: $pkgs"
          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"

      - id: set-matrix
        shell: bash
        run: |
          ARCHS="${{ inputs.archs || 'android,iOS' }}"
          PACKAGES="${{ steps.detect-packages.outputs.packages }}"
          BUILD_NUMBER="${{ inputs.build_number || '1' }}"

          matrix='{"include":['
          first=true
          for arch in $(echo "$ARCHS" | tr ',' ' '); do
            for pkg in $(echo "$PACKAGES" | tr ',' ' '); do
              pkg_name="${pkg%%:*}"
              if [ "$first" = true ]; then first=false; else matrix+=','; fi
              if [[ "$arch" == "android" ]]; then
                runner="ubuntu-latest"
                platform="android"
                rust_targets="aarch64-linux-android,arm-linux-androideabi,x86_64-linux-android,i686-linux-android"
              else
                # Pin macos-26 (Tahoe) — the image CPython migrated to in March
                # 2026 to escape the macos-15 1-in-11 iOS simulator hang
                # documented in actions/runner-images#12777. NOT `macos-latest`
                # (still resolves to macos-15 for now). Plan §5 Q5.
                runner="macos-26"
                platform="ios"
                rust_targets="aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios"
              fi
              matrix+="{\"job_name\":\"${platform}: ${pkg_name}\",\"artifact_name\":\"${platform}-${pkg_name}\",\"runner\":\"$runner\",\"platform\":\"$platform\",\"forge_arch\":\"$arch\",\"forge_packages\":\"$pkg\",\"build_number\":\"$BUILD_NUMBER\",\"rust_targets\":\"$rust_targets\"}"
            done
          done
          matrix+=']}'
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu runners only)
        # Ubuntu runners ship with ~14 GB free disk; that's tight once we
        # add the NDK r27d (~3 GB), python-build support tree, Flutter SDK,
        # Gradle cache, and dist/ + dist-test/ wheels. The test lane's
        # Gradle assembleRelease step blew past the limit on pillow's job
        # in run 26702042450 with "No space left on device" during
        # :app:mergeReleaseNativeDebugMetadata. The standard fix is the
        # jlumbroso/free-disk-space action — Toga uses it, ~30+ GB freed.
        # Only runs on Ubuntu (macOS runners have ample disk).
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false      # KEEP — we need android sdk + python tooling
          android: false         # KEEP — Android SDK is used by Build wheels (NDK) + Test
          dotnet: true
          haskell: true
          large-packages: false  # SKIP — sudo apt remove takes minutes; reaping above is enough
          docker-images: true
          swap-storage: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Build wheels
        shell: bash
        env:
          FORGE_ARCH: ${{ matrix.forge_arch }}
          FORGE_PACKAGES: ${{ matrix.forge_packages }}
          BUILD_NUMBER: ${{ matrix.build_number }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euxo pipefail

          PYTHON_SHORT_VERSION="${UV_PYTHON%.*}"

          . .ci/common.sh
          export MOBILE_FORGE_ANDROID_SUPPORT_PATH=""
          export MOBILE_FORGE_IOS_SUPPORT_PATH=""

          if [[ "$PLATFORM" == "android" ]]; then
            sudo apt-get update
            sudo apt-get install -y sqlite3

            python_android_dir="$HOME/projects/python-build/android"
            curl -#OL "https://github.com/flet-dev/python-build/releases/download/v${PYTHON_SHORT_VERSION}/python-android-mobile-forge-${PYTHON_SHORT_VERSION}.tar.gz"
            mkdir -p "$python_android_dir"
            tar -xzf "python-android-mobile-forge-${PYTHON_SHORT_VERSION}.tar.gz" -C "$python_android_dir"
            export MOBILE_FORGE_ANDROID_SUPPORT_PATH="$python_android_dir"

            # Restore libpython3.so symlink missing from the python-build
            # tarballs. pyo3-build-config (used by maturin 1.13+) emits a
            # `-lpython3` link directive for abi3 builds — the linker
            # resolves it via this symlink, and because libpython3.12.so's
            # SONAME is libpython3.12.so, the resulting .so still ends up
            # with libpython3.12.so in DT_NEEDED. Without it, maturin's
            # build silently produces a .so missing libpython.so from
            # DT_NEEDED, and Android dlopen later fails with
            # `cannot locate symbol "PyType_IsSubtype"` because Dart's
            # DynamicLibrary.open uses RTLD_LOCAL (so libpython symbols
            # aren't in the global scope when the extension is loaded).
            # iOS doesn't need this because Python.framework is linked
            # statically into the binary.
            for libpy in "$python_android_dir"/install/android/*/python-3.*/lib/libpython3.[0-9]*.so; do
              [[ -e "$libpy" ]] || continue
              ln -sf "$(basename "$libpy")" "$(dirname "$libpy")/libpython3.so"
            done

            . .ci/install_ndk.sh
          else
            python_ios_dir="$HOME/projects/python-build/darwin/Python-Apple-support"
            curl -#OL "https://github.com/flet-dev/python-build/releases/download/v${PYTHON_SHORT_VERSION}/python-ios-mobile-forge-${PYTHON_SHORT_VERSION}.tar.gz"
            mkdir -p "$python_ios_dir"
            tar -xzf "python-ios-mobile-forge-${PYTHON_SHORT_VERSION}.tar.gz" -C "$python_ios_dir"
            export MOBILE_FORGE_IOS_SUPPORT_PATH="$python_ios_dir"
          fi

          source ./setup.sh "$UV_PYTHON"

          IFS=' ' read -r -a packages <<< "$FORGE_PACKAGES"
          for package in "${packages[@]}"; do
            forge "$FORGE_ARCH" "$package:$BUILD_NUMBER"
          done

          # Drop the support-tree dep wheels produced by make_dep_wheels.py
          # iOS deps: bzip2, libffi, mpdecimal, openssl, xz
          # Android deps: bzip2, libffi, openssl, sqlite, xz
          rm -f dist/bzip2-* dist/libffi-* dist/mpdecimal-* dist/openssl-* dist/sqlite-* dist/xz-*

      # --- Mobile test lane (Phase 1 — Android x86_64 only) -----------------
      # See test-recipes-on-mobile-PLAN.md §2a. iOS testing is
      # deferred to Phase 3.

      - name: Detect test files for this recipe
        id: detect-tests
        # Platform-agnostic: both android + ios lanes consume has_tests.
        # Individual lane steps below gate on `matrix.platform == 'android' | 'ios'`.
        shell: bash
        env:
          FORGE_PACKAGES: ${{ matrix.forge_packages }}
        run: |
          set -euo pipefail
          pkg_name="${FORGE_PACKAGES%%:*}"
          if [[ -d "recipes/$pkg_name/test" ]] || compgen -G "recipes/$pkg_name/test_*.py" > /dev/null; then
            echo "Found tests for $pkg_name"
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "pkg_name=$pkg_name" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping mobile test — no test_*.py in recipes/$pkg_name/"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable KVM
        # GA'd April 2024 on standard Linux runners; needs a udev rule to
        # grant the runner user rw on /dev/kvm. Pattern from beeware/toga.
        # Android-only — macOS uses Hypervisor.Framework on its own.
        if: matrix.platform == 'android' && steps.detect-tests.outputs.has_tests == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Stage tests + build recipe-tester APK
        if: matrix.platform == 'android' && steps.detect-tests.outputs.has_tests == 'true'
        shell: bash
        env:
          PKG_NAME: ${{ steps.detect-tests.outputs.pkg_name }}
          FLET_CLI_NO_RICH_OUTPUT: 1
        run: |
          set -euxo pipefail

          # Copy just-built wheels into dist-test/ with build tags bumped to
          # 9999. Reason: pip's resolver merges --find-links and the
          # --extra-index-url (pypi.flet.dev) and picks the wheel with the
          # highest build tag per PEP 427. The published wheel on
          # pypi.flet.dev typically has build tag >= 1, while forge's
          # freshly-built wheel for the same version may have a lower (or
          # absent) build tag — so pip silently uses the OLD published wheel
          # and the recipe fix being validated is bypassed. Bumping local
          # copies to 9999 guarantees they win. Original dist/ is left
          # untouched so the publish step still ships at the user-specified
          # build_number.
          mkdir -p "$GITHUB_WORKSPACE/dist-test"
          for w in "$GITHUB_WORKSPACE"/dist/*.whl; do
              [[ -e "$w" ]] || continue
              base=$(basename "$w")
              # name-version[-buildtag]-pytag-abitag-plat.whl
              # → name-version-9999-pytag-abitag-plat.whl
              # abitag covers both cp312-cp312 (Python-specific) and
              # cp37-abi3 (stable ABI, used e.g. by cryptography).
              new=$(printf '%s\n' "$base" \
                    | sed -E 's/^([^-]+-[^-]+)(-[0-9]+)?-(cp[0-9]+-(cp[0-9]+|abi[0-9]+))-/\1-9999-\3-/')
              cp "$w" "$GITHUB_WORKSPACE/dist-test/$new"
          done

          ./tests/recipe-tester/stage_recipe.sh "$PKG_NAME"
          cd tests/recipe-tester
          # `--no-install-package` because the recipe is mobile-only — host
          # venv just needs flet + pytest. Without the flag uv tries to
          # build the recipe sdist for the host, which fails for any recipe
          # that doesn't ship a host-compatible wheel.
          uv sync --dev --no-install-package "$PKG_NAME"
          # `--yes` auto-accepts the interactive Flutter-SDK-install prompt
          # that flet-cli/flutter_base.py:_prompt_input raises on first run.
          # Without it, stdin is empty on CI and Confirm.ask hits EOFError.
          PIP_FIND_LINKS="$GITHUB_WORKSPACE/dist-test" \
            uv run --no-sync flet build apk --arch x86_64 --yes

      - name: Test on Android emulator (API 28, x86_64)
        if: matrix.platform == 'android' && steps.detect-tests.outputs.has_tests == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 20
        with:
          # API 28 minimum, NOT 24. mobile-forge wheels target API 24, but
          # Flet's Android app shell uses ImageDecoder.OnHeaderDecodedListener
          # (added in API 28) — on a 24 AVD the recipe-tester APK crashes at
          # launch with ClassNotFoundException before Python ever starts.
          api-level: 28
          arch: x86_64
          target: default
          disable-animations: true
          # The reactivecircus action invokes EACH LINE of `script:` through
          # `sh -c` separately — multi-line constructs (functions, traps, if
          # blocks) don't survive. Logic lives in .ci/run_android_test.sh
          # instead, which has its own bash shebang.
          script: .ci/run_android_test.sh

      # --- iOS lane (Phase 3 — non-blocking initially) -----------------------
      # `continue-on-error: true` is in effect during the stabilization
      # window. Plan §3 Phase 3 says: flip to blocking once 14-day flake
      # rate stays under 5%. Pinned to macos-26 to avoid the macos-15
      # simulator hang documented in actions/runner-images#12777.

      - name: Stage tests + build recipe-tester iOS sim app
        if: matrix.platform == 'ios' && steps.detect-tests.outputs.has_tests == 'true'
        continue-on-error: true
        shell: bash
        env:
          PKG_NAME: ${{ steps.detect-tests.outputs.pkg_name }}
          FLET_CLI_NO_RICH_OUTPUT: 1
        run: |
          set -euxo pipefail

          # Same dist-test wheel-bump as the Android lane — pip's build-tag
          # preference applies equally to iOS-tagged wheels resolving against
          # pypi.flet.dev's published copies.
          mkdir -p "$GITHUB_WORKSPACE/dist-test"
          for w in "$GITHUB_WORKSPACE"/dist/*.whl; do
              [[ -e "$w" ]] || continue
              base=$(basename "$w")
              new=$(printf '%s\n' "$base" \
                    | sed -E 's/^([^-]+-[^-]+)(-[0-9]+)?-(cp[0-9]+-(cp[0-9]+|abi[0-9]+))-/\1-9999-\3-/')
              cp "$w" "$GITHUB_WORKSPACE/dist-test/$new"
          done

          ./tests/recipe-tester/stage_recipe.sh "$PKG_NAME"
          cd tests/recipe-tester
          uv sync --dev --no-install-package "$PKG_NAME"
          PIP_FIND_LINKS="$GITHUB_WORKSPACE/dist-test" \
            uv run --no-sync flet build ios-simulator --yes

      - name: Test on iOS Simulator
        if: matrix.platform == 'ios' && steps.detect-tests.outputs.has_tests == 'true'
        continue-on-error: true
        timeout-minutes: 25
        shell: bash
        # iOS sim cold-boot can take 1-4 min on the macos-26 image. Same
        # logic-in-a-file convention as the Android lane; see
        # .ci/run_ios_test.sh.
        run: .ci/run_ios_test.sh

      # --- /iOS lane ---------------------------------------------------------

      - name: Upload test artifacts
        if: always() && steps.detect-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            console.log
            logcat-on-failure.txt
            screen-on-failure.png
            syslog-on-failure.txt
          if-no-files-found: ignore
          retention-days: 90

      # --- /Mobile test lane ------------------------------------------------

      - name: Publish wheels
        # `success() &&` so a test failure blocks publish — without it, a
        # passing build with failing tests would still ship the wheel.
        if: ${{ success() && inputs.publish && hashFiles('dist/*.whl') != '' }}
        shell: bash
        env:
          GEMFURY_TOKEN: ${{ secrets.GEMFURY_TOKEN }}
        run: |
          set -euxo pipefail
          . .ci/common.sh
          publish_to_pypi dist/*.whl

      - name: Upload logs on success
        if: ${{ success() && hashFiles('logs/*.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/*.log

      - name: Upload errors on failure
        if: ${{ failure() && hashFiles('errors/*.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: errors-${{ matrix.artifact_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: errors/*.log
